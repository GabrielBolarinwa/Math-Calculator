<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=7" />
    <meta
      name="description"
      content="This is a calculator built as a subset of the Gabriel Bolarinwa Portfolio. It is a scientific calculator made to carry out scientific calculations while chaining a long line of calculations fully supported by Javascript."
    />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=JetBrains+Mono:100,200,300,regular,500,600,700,800,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic"
      rel="stylesheet"
    />
    <meta content="text/html;charset=UTF-8" http-equiv="Content-Type" />
    <meta name="author" content="Bolarinwa Gabriel" />
    <meta name="application-name" content="Axiom" lang="en" />
    <meta property="og:name" content="Axiom" />
    <meta
      property="og:description"
      content="It is a scientific calculator made to carry out scientific calculations while chaining a long line of calculations fully supported by Javascript"
    />
    <meta
      property="og:image"
      content="https://gabrielbolarinwa-axiom.vercel.app/image.png"
    />
    <meta content="website" property="og:type" />

    <title>Math Calculator - Gabriel Bolarinwa</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>

  <body>
    <main class="calculator">
      <section aria-label="Calculator Display" class="display" role="math">
        <output id="display" class="displayOutput" aria-live="polite">0</output>
      </section>
      <nav class="buttons" aria-label="Calculator Buttons">
        <button aria-label="Clear Display" data-action="clear">C</button>
        <button aria-label="Backspace" data-action="backspace">&#9003;</button>
        <button aria-label="Left Bracket" data-value="(">&#40;</button>
        <button aria-label="Right Bracket" data-value=")">&#41;</button>

        <button aria-label="Power of" data-value="^">^</button>
        <button aria-label="Square Root" data-value="√">√</button>
        <button aria-label="log" data-value="log">log</button>
        <button aria-label="sin" data-value="sin(">sin</button>
        <button aria-label="cos" data-value="cos(">cos</button>
        <button aria-label="tan" data-value="tan(">tan</button>
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button
        ><button aria-label="Divide" data-value="&#247;">&#247;</button>
        <button aria-label="Multipication" data-value="&times;">&times;</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="-">-</button>
        <button data-value="+">+</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button aria-label="Pi" data-value="π">π</button>
        <button aria-label="e" data-value="e">e</button>
        <button data-value="0" class="zero-button">0</button
        ><button data-value=".">.</button>
        <button aria-label="Percentage" data-value="%">%</button>
        <button aria-label="Calculate" data-action="calculate">=</button>
      </nav>
    </main>
    <footer>
      <div>
        <p>Instructions List:</p>
        <ul>
          <li>Press x for clear</li>
          <li>Press 0 - 9 for numbers</li>
          <li>Press s for sin</li>
          <li>Press c for cos</li>
          <li>Press t for tan</li>
          <li>Press l for log</li>
          <li>Press r for square root</li>
          <li>Press ^ for Power</li>
          <li>Press e for exponent</li>
          <li>Press p for PI</li>
        </ul>
      </div>
    </footer>
    <script type="module" src="js/script.js"></script>
  </body>
</html>
