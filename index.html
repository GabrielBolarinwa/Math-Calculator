<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=7" />
    <meta
      name="description"
      content="This is a calculator built as a subset of the Gabriel Bolarinwa Portfolio. It is a scientific calculator made to carry out scientific calculations while chaining a long line of calculations fully supported by Javascript."
    />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=JetBrains+Mono:100,200,300,regular,500,600,700,800,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic"
      rel="stylesheet"
    />
    <meta content="text/html;charset=UTF-8" http-equiv="Content-Type" />
    <meta name="author" content="Bolarinwa Gabriel" />
    <meta name="application-name" content="Axiom" lang="en" />
    <meta property="og:name" content="Axiom" />
    <meta
      property="og:description"
      content="It is a scientific calculator made to carry out scientific calculations while chaining a long line of calculations fully supported by Javascript"
    />
    <meta
      property="og:image"
      content="https://gabrielbolarinwa-axiom.vercel.app/image.png"
    />
    <meta content="website" property="og:type" />

    <title>Math Calculator - Gabriel Bolarinwa</title>
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>

  <body>
    <main class="calculator">
      <section aria-label="Calculator Display" class="display">
        <output id="display" class="displayOutput" aria-live="polite">0</output>
      </section>
      <nav class="buttons" aria-label="Calculator Buttons">
        <button data-action="clear">C</button>
        <button data-action="backspace">&#9003;</button>
        <button data-value="(">&#40;</button>
        <button data-value=")">&#41;</button>

        <button data-value="^">^</button>
        <button data-value="√">√</button>
        <button data-value="log">log</button>
        <button data-value="sin(">sin</button>
        <button data-value="cos(">cos</button>
        <button data-value="tan(">tan</button>
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button
        ><button data-value="&#247;">&#247;</button>
        <button data-value="&times;">&times;</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="-">-</button>
        <button data-value="+">+</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="π">π</button>
        <button data-value="e">e</button>
        <button data-value="0" class="zero-button">0</button
        ><button data-value=".">.</button>
        <button data-value="%">%</button>
        <button data-action="calculate">=</button>
      </nav>
    </main>
    <script src="js/script.js"></script>
  </body>
</html>
